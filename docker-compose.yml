# =============================================================================
# docker-compose.yml - Estok en Coolify
# Contenedor único: Backend Django + Frontend Astro + Nginx
# =============================================================================
# NOTA: Este archivo es usado por Coolify para orquestar el contenedor.
# Los puertos deben coincidir con:
#   - EXPOSE en Dockerfile.combined
#   - listen en nginx-combined.conf
#   - traefik.http.services.estok.loadbalancer.server.port
# =============================================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: estok-app
    restart: unless-stopped
    ports:
      - "${ESTOK_PORT:-8000}:${ESTOK_PORT:-8000}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.estok.loadbalancer.server.port=${ESTOK_PORT:-8000}"
      - "traefik.http.routers.estok.rule=Host(`eeestok.duckdns.org`)"
      - "traefik.http.routers.estok.entrypoints=websecure"
      - "traefik.http.routers.estok.tls=true"
    environment:
      # Puerto principal (debe coincidir con EXPOSE y nginx listen)
      - ESTOK_PORT=${ESTOK_PORT:-8000}

      # Django
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,eeestok.duckdns.org}
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-True}
      - DJANGO_CORS_ORIGINS=${DJANGO_CORS_ORIGINS:-https://eeestok.duckdns.org}

      # Base de datos PostgreSQL
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-estok_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST:-cagtcifjoy8ydxugg4bkdll1}
      - DB_PORT=${DB_PORT:-5432}

      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_LIFETIME=${JWT_ACCESS_TOKEN_LIFETIME:-3600}
      - JWT_REFRESH_TOKEN_LIFETIME=${JWT_REFRESH_TOKEN_LIFETIME:-604800}

      # IA
      - AI_API_ENDPOINT=${AI_API_ENDPOINT:-http://192.168.0.101:1234/v1}
      - AI_API_TIMEOUT=${AI_API_TIMEOUT:-180}
      - AI_HIGH_RES_TIMEOUT=${AI_HIGH_RES_TIMEOUT:-240}

      # Media
      - MEDIA_URL=/media/
      - MEDIA_ROOT=/app/media

      # Frontend (ruta relativa para que pase por Nginx interno, no por Traefik)
      - PUBLIC_API_URL=/api
      - PUBLIC_SITE_URL=https://eeestok.duckdns.org

    networks:
      - default
      - coolify
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

volumes:
  media_data:
    driver: local
  static_data:
    driver: local

networks:
  coolify:
    external: true
