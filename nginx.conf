# =============================================================================
# Nginx - Configuración para Estok (Frontend Astro SSR)
# Solo sirve el frontend Astro (Node :4321)
# El backend se accede directamente via https://eeestok.duckdns.org/api/
# =============================================================================

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cacheo de assets estáticos del frontend (con hash en nombre)
    location /assets/ {
        proxy_pass http://127.0.0.1:4321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cacheo de icons PWA
    location /icons/ {
        proxy_pass http://127.0.0.1:4321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest (no cachear)
    location /manifest.json {
        proxy_pass http://127.0.0.1:4321;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json" always;
    }

    # Service Worker: NO cachear y permitir scope raíz
    location /sw.js {
        proxy_pass http://127.0.0.1:4321;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    # Frontend: proxy todo al servidor Astro (Node)
    # Astro en hybrid mode sirve páginas estáticas y renderiza dinámicas
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
