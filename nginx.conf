# =============================================================================
# Nginx - Configuración para Estok (SSR + API)
# Proxy inverso: frontend SSR (Node :4321) + API Django (:8000)
# =============================================================================

upstream frontend {
    server backend:4321;
}

upstream api {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cacheo de assets estáticos (con hash en nombre)
    location /assets/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cacheo de icons
    location /icons/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest (no cachear)
    location /manifest.json {
        proxy_pass http://frontend;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json" always;
    }

    # Service Worker: NO cachear y permitir scope raíz
    location /sw.js {
        proxy_pass http://frontend;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    # API: proxy a Django
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
    }

    # Admin de Django
    location /admin/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media (fotos subidas)
    location /media/ {
        proxy_pass http://api;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static (Django admin)
    location /static/ {
        proxy_pass http://api;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SSR: todas las demás rutas al servidor Node
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
