# =============================================================================
# Nginx - Configuración para Estok (Hybrid Frontend + API Django)
# Proxy inverso: frontend Astro (Node :4321) + API Django (:8000)
# =============================================================================

server {
    listen 80;
    server_name _;

    # Resolver DNS para resolución dinámica de nombres de servicio
    # 127.0.0.11 es el DNS interno de Docker
    resolver 127.0.0.11 valid=10s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cacheo de assets estáticos del frontend (con hash en nombre)
    location /assets/ {
        set $frontend_upstream http://frontend:4321;
        proxy_pass $frontend_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cacheo de icons PWA
    location /icons/ {
        set $frontend_upstream http://frontend:4321;
        proxy_pass $frontend_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest (no cachear)
    location /manifest.json {
        set $frontend_upstream http://frontend:4321;
        proxy_pass $frontend_upstream;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json" always;
    }

    # Service Worker: NO cachear y permitir scope raíz
    location /sw.js {
        set $frontend_upstream http://frontend:4321;
        proxy_pass $frontend_upstream;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    # API: proxy a Django
    location /api/ {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
    }

    # Admin de Django
    location /admin/ {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media (fotos subidas)
    location /media/ {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static (Django admin)
    location /static/ {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend: proxy todo al servidor Astro (Node)
    # Astro en hybrid mode sirve páginas estáticas y renderiza dinámicas
    location / {
        set $frontend_upstream http://frontend:4321;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}


