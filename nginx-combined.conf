# =============================================================================
# Nginx - Configuración para Estok (Contenedor Único)
# Escucha en puerto 8000 (el que Coolify expone)
# Backend en localhost:8001, Frontend Astro en localhost:4321
# Fallback a archivos estáticos si Astro no está disponible
# =============================================================================

server {
    listen 8000;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API (Gunicorn en 8001)
    location /api/ {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
    }

    # Admin de Django
    location /admin/ {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media (fotos subidas)
    location /media/ {
        proxy_pass http://localhost:8001;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static (archivos estáticos de Django)
    location /static/ {
        proxy_pass http://localhost:8001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Assets del frontend (con hash) - servir estáticamente
    location /assets/ {
        root /app/frontend/dist;
        try_files $uri @astro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Icons PWA
    location /icons/ {
        root /app/frontend/dist;
        try_files $uri @astro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest
    location /manifest.json {
        root /app/frontend/dist;
        try_files $uri @astro;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json" always;
    }

    # Service Worker
    location /sw.js {
        root /app/frontend/dist;
        try_files $uri @astro;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    # Archivos estáticos del frontend (HTML, etc.)
    location /_astro/ {
        root /app/frontend/dist;
        try_files $uri @astro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend: intentar Astro, fallback a archivos estáticos
    location / {
        # Intentar servidor Astro primero
        proxy_pass http://localhost:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Si Astro falla (502/503), servir archivos estáticos
    location @astro {
        root /app/frontend/dist;
        try_files $uri $uri.html $uri/index.html /index.html =404;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
