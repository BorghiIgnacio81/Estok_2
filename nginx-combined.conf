# =============================================================================
# Nginx - Configuración para Estok (Contenedor Único)
# Escucha en puerto 80 (el que Coolify/Traefik espera)
# Backend en localhost:8001, Frontend Astro en localhost:4321
# Fallback a archivos estáticos si Astro no está disponible
# =============================================================================

# Aumentar bucket size para el map de CORS (necesario con muchas entradas)
map_hash_bucket_size 128;

# Mapa de orígenes CORS permitidos (para preflight OPTIONS)
# Incluye producción, sslip.io, y orígenes de desarrollo local
map $http_origin $cors_origin {
    default "";
    "https://eeestok.duckdns.org" $http_origin;
    "https://sq641axhkdx4oz4oss522ht9.178.156.224.212.sslip.io" $http_origin;
    "http://localhost:4321" $http_origin;
    "http://localhost:4322" $http_origin;
    "http://127.0.0.1:4321" $http_origin;
    "http://127.0.0.1:4322" $http_origin;
}

server {
    listen 8000;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API (Gunicorn en 8001)
    location /api/ {
        # Manejar CORS preflight directamente en Nginx
        # (evita que el OPTIONS llegue al viewset de Django que requiere auth)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, PATCH, DELETE" always;
            add_header Access-Control-Allow-Headers "authorization, content-type, accept, origin, x-csrftoken, x-requested-with" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length "0" always;
            add_header Content-Type "text/plain; charset=utf-8" always;
            return 204;
        }

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 200s;
        proxy_connect_timeout 30s;
    }

    # Callback de MercadoLibre OAuth (fuera de /api/ para evitar service worker)
    location /ml-callback/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 200s;
        proxy_connect_timeout 30s;
    }

    # Admin de Django
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media (fotos subidas) - servido directamente por Nginx
    # Django no sirve media en producción (DEBUG=False), por eso Nginx
    # debe servirlos desde el filesystem en vez de proxy_pass a Gunicorn.
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static (archivos estáticos de Django)
    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Assets del frontend (con hash) - servir estáticamente
    location /assets/ {
        root /app/frontend/dist/client;
        try_files $uri @astro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Icons PWA
    location /icons/ {
        root /app/frontend/dist/client;
        try_files $uri @astro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest
    location /manifest.json {
        root /app/frontend/dist/client;
        try_files $uri @astro;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json" always;
    }

    # Service Worker
    location /sw.js {
        root /app/frontend/dist/client;
        try_files $uri @astro;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript" always;
    }

    # Archivos estáticos del frontend (HTML, etc.)
    location /_astro/ {
        root /app/frontend/dist/client;
        try_files $uri @astro;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }


    # Frontend: intentar Astro, fallback a archivos estáticos
    location / {
        # Intentar servidor Astro primero
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Si Astro falla (502/503), servir archivos estáticos
    location @astro {
        root /app/frontend/dist;
        try_files $uri $uri.html $uri/index.html /index.html =404;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
